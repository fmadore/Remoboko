<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Remoboko Timeline</title>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Open Sans', Arial, sans-serif;
            margin: 0;
            padding: 20px;
            color: #333;
        }
        h1 {
            font-size: 20px;
            font-weight: 600;
            margin: 0 0 16px 0;
        }
        .timeline {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
        }
        .timeline svg {
            width: 100%;
            height: auto;
        }
        .event-line {
            stroke-width: 1;
            opacity: 0.5;
        }
        .event-circle {
            stroke: white;
            stroke-width: 1.5;
            cursor: pointer;
            transition: r 0.15s;
        }
        .event-text {
            font-size: 11px;
            fill: #333;
        }
        .legend-label {
            font-size: 13px;
            font-weight: 600;
        }
        .axis text {
            font-size: 12px;
            font-family: 'Open Sans', Arial, sans-serif;
        }
        .timeline-tooltip {
            position: absolute;
            pointer-events: none;
            opacity: 0;
            background: white;
            border-radius: 6px;
            padding: 8px 12px;
            font-size: 13px;
            line-height: 1.4;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
            transition: opacity 0.15s;
            max-width: 260px;
        }
    </style>
</head>
<body>
    <h1>Religious, educational and political events in Togo and Benin</h1>
    <div id="timeline" class="timeline"></div>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="script.js" defer></script>
</body>
</html>
